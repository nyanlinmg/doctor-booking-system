<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="../js/doctor_login.js" defer></script>

    <style>
        .loader {
            width: 25px;
            height: 25px;
            border: 4px solid #ddd;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    
    <div class="w-[80%] md:w-[50%] m-auto my-13 p-3 rounded-lg" id="show-box"></div>

     <div class="login-box w-[300px] md:w-[380px] m-auto mt-13 rounded-lg overflow-hidden shadow-lg border">
        <h1 class="text-center bg-gray-600 text-white text-2xl p-3">Doctor Login</h1>
        <form action="#" class="px-4 py-3">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="w-[100%] mb-3 mt-1 border rounded-md border-gray-500 p-1" title="Enter valid email">

            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="w-[100%] mb-3 mt-1 border rounded-md border-gray-500 p-1" title="Enter strong password">
            
            <small>Wanna go back to admin login ? <a href="admin_login.html" class="text-blue-500 underline">go back</a></small>

            <div class="w-[100%] m-auto flex justify-center pt-4">
                <button type="submit" class="bg-gray-600 px-5 rounded-lg cursor-pointer flex items-center py-2 text-white" >
                    <h1 id="btn">Submit</h1>
                    <div id="loader" class="loader mb-2 ms-2" style="display:none;"></div>
                </button>
            </div>

        </form>
     </div>
</body>
</html>
