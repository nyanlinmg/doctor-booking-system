<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="../js/doctor_page.js" defer></script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="flex w-[100%] h-[2000px]" id="main_box">
        <div id="side_bar" class="w-[20%] md:w-[15%] lg:w-[20%] bg-white">
            <div class=" px-3 text-left ps-4 py-2 cursor-pointer hover:bg-blue-200 transition duration-300 hover:border-e-3 hover:border-blue-500" id="dashboard">
                <i class="fa-regular fa-house text-[20px] me-2">
                </i><small class="text-[18px] text-gray-600 hidden lg:inline">Dashboard</small>
            </div>

            <div class=" px-3 text-left ps-4 py-2 cursor-pointer hover:bg-blue-200 transition duration-300 hover:border-e-3 hover:border-blue-500" id="appointments">
                <i class="fa-regular fa-calendar-days text-[20px] me-2"></i><small class="text-[18px] text-gray-600 hidden lg:inline">Appointments</small>
            </div>

            <div class=" px-3 text-left ps-4 py-2 cursor-pointer hover:bg-blue-200 transition duration-300 hover:border-e-3 hover:border-blue-500" id="profile">
                <i class="fa-solid fa-user-doctor text-[20px] me-2"></i><small class="text-[18px] text-gray-600 hidden lg:inline">Profile</small>
            </div>
        </div>

        <div class="w-[100%] bg-blue-50 p-3" id="show_box">

        </div>
    </div>
</body>
</html>
