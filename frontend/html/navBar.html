<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        html{
            scroll-behavior: smooth;
        }

        ul>li>a{
            text-decoration: none;
            color: black;
            position: relative;
            padding-bottom: 5px;
        }

        ul>li>a::after{
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            background: black;
            height: 2px;
        }

        ul>li>a:hover::after{
            transition: all 0.8s;
            width: 100%;
        }

        .drop{
            animation: dropdown 1s forwards;
        }

        .slideDrop{
            animation: slidedropdown 1s forwards;
        }

        @keyframes slidedropdown {
            from {left: -260px}
            to {left: 40px}
        }

        @keyframes dropdown {
            from {top: -200px;}
            to {top: 120px;}
        }

        .profile-link:hover{
            background-color: rgba(0, 79, 249, 0.751);
        }

        .profile-link:hover a{
            color: white;
        }
    </style>
</head>
<body>
    <div class="border flex justify-between border-gray-400 m-3 shadow-xl items-center p-3 rounded-[20px]">
        <img src="../images/victoria.png" alt="victoria_logog" width="100">

        <div id="nav_name" class="hidden"></div>

        <ul id="nav_link" style="list-style: none" class="md:flex hidden gap-[20px]">
            <li><a href="../html/index.html">HOME</a></li>
            <li><a href="../html/all_doctors.html">ALL DOCTORS</a></li>
            <li><a href="../html/about.html">ABOUT</a></li>
            <li><a href="../html/contact.html">CONTACT</a></li>
        </ul>

        <div class="md:flex hidden">
            <a href="../html/admin_login.html" class="me-3 shadow-lg border p-3 rounded-[20px] text-center" id="admin_panel">Admin Panel</a>

            <a href="../html/create_account.html" id="account" class="shadow-lg items-start w-[150px] text-white py-3 bg-blue-500 rounded-full text-center hover:bg-transparent hover:text-blue-700 hover:ring-2 hover:ring-blue-500 hover:ring-offset-2" style="transition: all 0.4s;">Create an account</a>

            <div id="profile-section" class="hidden">
                <button id="dropdown" class="shadow-lg border p-2 cursor-pointer rounded-full hover:bg-gray-100" title="click to view" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </button>
            </div>

            <div id="logout_btn" class="hidden">
                <button type="button" class="bg-blue-500 text-white text-center p-2 rounded-lg cursor-pointer hover:shadow-xl">Logout</button>
            </div>
        </div>

        <i class="bi bi-list text-[35px] block md:hidden" style="cursor: pointer;" id="menu"></i>
        <i class="bi bi-x-lg text-[35px] hidden" style="cursor: pointer;" id="close"></i>
    </div>

    <div class=" w-[180px] absolute right-3 border" id="dropItem" style="top: -200px;">
        <ul class="p-2">
            <li class="text-center border mb-2 p-1 profile-link"><a href="../html/login.html" id="profile_link"><i class="bi bi-person-bounding-box me-2"></i>Profile</a></li>
            <li class="text-center border mb-2 p-1 profile-link cursor-pointer"><a id="appointment_link">My Appointment</a></li>
            <li class="text-center border mb-2 p-1 profile-link cursor-pointer hidden" id="admin_link"><a href="../html/admin_page.html">Admin Page</a></li>
            <li class="text-center border p-1 profile-link cursor-pointer" id="logout-btn"><a id="logout-btn" href="../html/create_account.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
    </div>

    <div id="slide" style="position: fixed;left: -500px;" class="border w-[250px] h-[500px] flex-col flex border-gray-400 m-3 shadow-2xl backdrop-blur-sm p-3 rounded-[20px]">
        <img src="../images/victoria.png" alt="victoria_logog" width="100" class="mb-8">

        <div id="nav_name" class="hidden"></div>

        <ul style="list-style: none" id="nav_link">
            <li class="mb-4"><a href="../html/index.html">HOME</a></li>
            <li class="mb-4"><a href="../html/all_doctors.html">ALL DOCTORS</a></li>
            <li class="mb-4"><a href="../html/about.html">ABOUT</a></li>
            <li class="mb-4"><a href="../html/contact.html">CONTACT</a></li>
        </ul>

        <div class="flex flex-col">
            <a href="../html/admin_login.html" class="me-3 shadow-lg border p-2 w-[100%] text-center mb-5 mt-6" id="admin_panel">Admin Panel</a>

            <a href="../html/create_account.html" id="account"  class="shadow-lg w-[100%] text-white bg-blue-500 p-2 hover:bg-transparent hover:text-blue-700 hover:ring-2 hover:ring-blue-500 hover:ring-offset-2" style="transition: all 0.4s;">Create an account</a>

            <div id="profile-section" class="hidden">
                <button id="dropdown" class="shadow-lg border p-2 cursor-pointer  w-[100%] text-center bg-blue-500 text-white" title="click to view" type="button">
                    <i class="bi bi-person-circle me-3"></i>Profile
                </button>

                <div class="w-[180px] absolute right-3 border bg-blue-200" id="dropItem" style="top: 400px;left: -260px;">
                    <ul class="p-2">
                        <li class="text-center border mb-2 p-1 profile-link"><a href="../html/login.html" id="profile_link"><i class="bi bi-person-bounding-box me-2"></i>Profile</a></li>
                        <li class="text-center border mb-2 p-1 profile-link cursor-pointer"><a id="appointment_link">My Appointment</a></li>
                        <li class="text-center border mb-2 p-1 profile-link cursor-pointer hidden" id="admin_link"><a href="../html/admin_page.html">Admin Page</a></li>
                        <li class="text-center border p-1 profile-link cursor-pointer" id="logout-btn"><a href="../html/create_account.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>

            <div id="logout_btn" class="hidden">
                <button type="button" class="bg-blue-500 w-[100%] text-white text-center p-2 rounded-lg cursor-pointer hover:shadow-xl">Logout</button>
            </div>

        </div>
    </div>

    <script>
        const logout = document.querySelector("#logout-btn");

        logout.addEventListener('click', () => {
            profileSection.classList.add('hidden');
            accountBtn.classList.remove('hidden');
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('login');
            localStorage.removeItem('admin_login');
        })
    </script>
</body>
</html>
