<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="../js/my_appointment.js" defer></script>

    <style>
        .loader {
            width: 20px;
            height: 20px;
            border: 4px solid #ddd;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="relative">
    <div id="backDrop" class="w-[100%] h-[100%] absolute bg-black opacity-80 hidden top-0 left-0"></div>

    <div id="modal" class="absolute bg-white p-4" style="top: -100%; left: 50%; transform: translate(-50%, -50%); transition: all 0.5s; visibility: hidden; opacity: 0;">
        
    </div>

    <div id="navbar-placeholder"></div>

    <h1 class="font-bold border-b-2 border-b-gray-400 w-[95%] m-auto pb-2">My Appointments</h1>

    <div id="show_appointment" class="w-[95%] m-auto">
        
    </div>

    <div id="footer-box" class="mt-18"></div>
</body>
</html>
