<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../js/create_acc.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <div id="navbar-placeholder"></div>
    
    <div class="show_after_create">
        
    </div>

    <div class="form_box p-8 w-[360px] md:w-[500px] m-auto mt-10 rounded-xl shadow-2xl border border-gray-300">
        <form action="#">

            <h1 class="text-[24px] text-gray-500 font-bold mb-2">Create Account</h1>
            <p class="mb-2 text-gray-500">Please sign up to book appointment</p>

            <label for="fullName">Full Name</label>
            <input type="text" name="fullName" id="fullName" class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-4" required>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-4" required>

            <label for="password">Password</label>
            <input type="password" name="pwd" id="pwd" class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-3">

            <label for="gender">Gender</label>
            <select name="gender" id="gender" class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-3">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <label for="address">Address</label>
            <input type="text" name="address" id="address" class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-3" required>

            <label for="phone">Phone</label>
            <input type="text" name="phone" id="phone" class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-3" required>

            <label for="birthday">Birthday</label>
            <input type="date" name="date" id="date" class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-3" required>

            <input type="hidden" name="role" id="role" value='1'>;

            <label for="image">Profile Photo</label>
            <input type="file" name="image" accept="image/*" id="image"
            class="border border-gray-300 mt-1 w-[100%] rounded-lg p-2 mb-3">

            <button type="submit" class="w-[100%] mb-3 cursor-pointer mt-3 bg-blue-500 text-white p-2">Create Account</button>

            <small>Already have an account? <a href="../html/login.html" class="text-blue-600 underline">Login here</a></small>
        </form>
    </div>
    
</body>
</html>
