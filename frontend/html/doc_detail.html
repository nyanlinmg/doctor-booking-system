<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../js/doc_detail.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>

        #date_box{
            padding: 18px 15px;
            border: 2px solid rgb(141, 138, 138);
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .timeTableBox {
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="doc_detail flex-row w-[80%] py-0 px-0 gap-5 sm:flex sm:px-5 sm:py-5 sm:w-[100%] md:w-[80%] m-auto items-center md:gap-10">
        <div class="rounded-lg shadow-lg mb-4 lg:mb-0">
            <img alt="doc_img" id="doc_img" class="m-auto w-[100%] h-[250px] object-cover">
        </div>

        <div class="doc_info w-[100%] sm:w-[80%] sm:border sm:px-5 sm:py-7 sm:border-gray-400 sm:rounded-xl">
            <h1 id="doc_name"></h1>
            <div class="flex gap-5 mb-3">
                <div id="degree"></div>
                <div>
                    <small id="exp_year"></small>
                </div>
            </div>
            <div class="mb-3">
                <b>About <i class="bi bi-info-circle ms-2"></i></b>
                <p id="about"></p>
            </div>
            <p>Appointment fee: <b id="fee"></b></p>
        </div>
    </div>

    <div class="p-4 w-[80%] m-auto mt-5 mb-5">
        <b class="mb-5">Booking slots</b>

        <div class="schedule_box flex flex-wrap gap-6 mt-5">
            <div id="date_box">
                <div id="day"></div>
                <div id="date" class="text-center"></div>
            </div>

            <div id="date_box">
                <div id="day"></div>
                <div id="date" class="text-center"></div>
            </div>

            <div id="date_box">
                <div id="day"></div>
                <div id="date" class="text-center"></div>
            </div>

            <div id="date_box">
                <div id="day"></div>
                <div id="date" class="text-center"></div>
            </div>

            <div id="date_box">
                <div id="day"></div>
                <div id="date" class="text-center"></div>
            </div>

            <div id="date_box">
                <div id="day"></div>
                <div id="date" class="text-center"></div>
            </div>

            <div id="date_box">
                <div id="day"></div>
                <div id="date" class="text-center"></div>
            </div>
        </div>

        <div class="timeTableBox">

        </div>

        <button type="button" class="bg-blue-500 rounded-full text-white hidden w-[200px] p-2" id="book_btn">Book an appointment</button>
    </div>

    <div class="related_doctors mt-5 text-center mb-10">
        <h2 class="text-[30px]">Related Doctors</h2>
        <small class="text-[16px]">Simply browse through our extensive list of trusted doctors.</small>

        <div class="related_box mt-5 mb-5 flex gap-5 w-[80%] m-auto flex-wrap items-center justify-center">

        </div>
    </div>

    <div id="footer-box" class="mt-18"></div>
    
</body>
</html>
